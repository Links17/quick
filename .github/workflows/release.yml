name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app
        run: make zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Quick.app.zip
          generate_release_notes: true
